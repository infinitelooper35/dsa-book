<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Interview-Ready DSA Playbook</title>
  <meta name="description" content="A practical DSA book you can flip through like real pages." />
  <link rel="stylesheet" href="./styles.css?v=book2" />
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="./app.js?v=book2"></script>
</head>
<body>
  <header class="topbar">
    <div class="logo">📘 <span>DSA Playbook</span></div>
    <div class="top-actions">
      <button id="homeBtn" class="ghost">Front Page</button>
      <button id="libraryBtn" class="ghost">Library</button>
      <button id="themeBtn" class="ghost">🌙 Theme</button>
    </div>
  </header>

  <main>
    <section id="coverView" class="cover-view">
      <div class="cover-glow"></div>
      <div class="book-cover">
        <p class="badge">Mr.Peralta Edition</p>
        <h1>The Interview-Ready<br/>DSA Playbook</h1>
        <p class="subtitle">One page per day. Zero fluff. Built for passing real interviews.</p>

        <div class="cover-stats" id="coverStats"></div>

        <div class="cover-actions">
          <button id="startLatestBtn" class="primary">Start Latest Page</button>
          <button id="startManuscriptBtn" class="ghost">Open Full Manuscript</button>
        </div>
      </div>
    </section>

    <section id="bookView" class="book-view hidden">
      <aside id="libraryPanel" class="library hidden">
        <div class="library-head">
          <h3>Pages</h3>
          <input id="searchInput" type="search" placeholder="Search page..." />
        </div>
        <ul id="pageList"></ul>
      </aside>

      <section class="reader-area">
        <div class="reader-controls">
          <button id="prevBtn" class="tiny">← Prev</button>
          <button id="nextBtn" class="tiny">Next →</button>
          <button id="manuscriptBtn" class="tiny">Full Manuscript</button>
          <span id="pageMeta">Page</span>
        </div>

        <div class="book-shell" id="bookShell">
          <article id="content" class="paper">Loading…</article>
          <div class="page-number" id="pageNumber">—</div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
